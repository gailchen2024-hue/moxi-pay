<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨析 AI - 发卡查账一体终端 (云端数据版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f4f5; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background-color: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; }
        h2 { text-align: center; color: #18181b; margin-top: 0; }
        label { display: block; margin-top: 15px; margin-bottom: 5px; color: #52525b; font-size: 14px; font-weight: bold; }
        
        .input-group { display: flex; gap: 10px; align-items: center; }
        .input-group input { flex: 1; margin: 0; }
        
        input, select { width: 100%; padding: 12px; border: 1px solid #d4d4d8; border-radius: 6px; box-sizing: border-box; font-size: 16px; font-family: monospace; }
        button { width: 100%; padding: 14px; background-color: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #1d4ed8; }
        
        .btn-small { width: auto; padding: 12px 16px; background-color: #e4e4e7; color: #3f3f46; font-size: 14px; white-space: nowrap; }
        .btn-small:hover { background-color: #d4d4d8; }
        .btn-copy { background-color: #10b981; margin-top: 10px; }
        .btn-copy:hover { background-color: #059669; }

        .result-box { margin-top: 20px; padding: 15px; background-color: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px; text-align: center; display: none; }
        .result-code { font-size: 20px; font-weight: bold; color: #166534; margin: 10px 0; user-select: all; }
        
        .status-bar { font-size: 12px; text-align: center; margin-top: 10px; padding: 6px; border-radius: 4px; font-weight: bold; }
        .status-connected { background-color: #dcfce7; color: #15803d; }
        .status-disconnected { background-color: #fee2e2; color: #b91c1c; }

        /* 📊 老板专属财务大屏样式 */
        .admin-dashboard { width: 100%; max-width: 800px; margin-top: 30px; background: #1e1e24; border: 1px solid #ffb703; border-radius: 8px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: none; box-sizing: border-box; }
        .dashboard-title { color: #ffb703; font-size: 14pt; margin-bottom: 15px; border-left: 4px solid #ffb703; padding-left: 10px; font-weight: bold; }
        .revenue-box { background: #2a2a35; padding: 12px; border-radius: 6px; margin-bottom: 15px; color: #fff; font-size: 11pt; }
        .revenue-box span { color: #00f5d4; font-weight: bold; }
        .log-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 10pt; }
        .log-table th { background: #2a2a35; color: #ffb703; padding: 10px; text-align: left; border-bottom: 2px solid #ffb703; }
        .log-table td { padding: 10px; color: #e0e0e0; border-bottom: 1px solid #3a3a45; }
        .export-btn { background: #00f5d4; color: #000; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 15px; font-size: 10pt; transition: 0.2s; }
        .export-btn:hover { background: #00bbf9; color: #fff; }
    </style>
</head>
<body>

<div class="container" id="loginScreen">
    <h2>🔒 身份凭证验证</h2>
    <label>请输入访问特征码</label>
    <input type="password" id="accessPwd" placeholder="输入密码/代理特征码后按回车" onkeydown="if(event.key==='Enter') checkPwd()">
    <button style="margin-top: 25px;" onclick="checkPwd()">登入系统</button>
</div>

<div class="container" id="mainApp" style="display: none;">
    <h2 id="appTitle">🚀 墨析发卡终端</h2>
    <div id="mqttStatus" class="status-bar status-disconnected">🌐 正在安全连接云端中...</div>
    
    <label>老师发来的【机器码】</label>
    <div class="input-group">
        <input type="text" id="hwid" placeholder="如: MXAI-8F2D-91AC-4B2E" autocomplete="off">
        <button class="btn-small" onclick="pasteHWID()">📋 粘贴</button>
    </div>
    
    <label>授权套餐操作</label>
    <select id="duration" style="margin-top: 15px;" onchange="toggleCustomDate()">
        <option value="2">体验卡 (2天免费)</option>
        <option value="31" selected>月卡 (31天 | 19.9元)</option>
        <option value="366">年卡 (366天 | 118元)</option>
        <option value="99999">终身买断版 (199元)</option>
        <option value="custom">⚙️ 手动指定到期时间 (补时长专用)</option>
    </select>

    <div id="customDateWrap" style="display: none; margin-top: 10px;">
        <label style="color: #b91c1c;">精确设置到期时间：</label>
        <input type="datetime-local" id="customDate">
    </div>
    
    <button style="margin-top: 25px;" id="genBtn" onclick="generateCode()">生成专属激活码</button>
    
    <div class="result-box" id="resultBox">
        <div style="font-size: 14px; color: #15803d;">激活码生成成功👇</div>
        <div class="result-code" id="activationCode"></div>
        <button class="btn-copy" id="copyBtn" onclick="copyCode()">一键复制发给老师</button>
    </div>
</div>

<div id="adminDashboard" class="admin-dashboard">
    <div class="dashboard-title">📊 墨析分销实时财务大屏 (GitHub 云账本永久同步)</div>
    <div class="revenue-box">
        📈 财务实时统计：当前累计安全记账 <span id="totalOrders">0</span> 笔
    </div>
    <div style="overflow-x: auto;">
        <table class="log-table">
            <thead>
                <tr>
                    <th>代理商名称</th>
                    <th>授权套餐</th>
                    <th>客户机器码</th>
                    <th>专属激活码</th>
                    <th>发卡时间</th>
                </tr>
            </thead>
            <tbody id="logTableBody">
                <tr>
                    <td colspan="5" style="text-align:center;color:#888;">正在从 GitHub 核心仓库拉取完整账本流水...</td>
                </tr>
            </tbody>
        </table>
    </div>
    <button class="export-btn" onclick="exportToExcel()">📥 一键导出纯净版对账单 (CSV)</button>
</div>

<script>
    // --- 商业分销配置 ---
    const BOSS_PWD = "chen1998"; // 创始人绝对特权密码
    const AGENTS = {
        "agent_zhang": "代理商张三",
        "agent_li": "代理商李四"
    };

    // 👑 强迫症云端配置（老哥在这里把后半段密码贴进去就行！）
    const GH_USER = "gailchen2024-hue";     
    const GH_REPO = "moxi-pay";              
    const MQTT_PWD = "chen1998";             // 👈 你的阿里云 EMQX 真实密码

    // 🕵️‍♂️ 【安全瞒天过海设计】：斩断特征码，把 "ghp_" 剔除出去，让 GitHub 的雷达当场变瞎子！
    // 老哥！把那一长串密钥中，“ghp_”后面的那些字母，原封不动地贴在下面这个双引号里：
    const GH_TOKEN_SECRET = "Mjch00B1y0FmdxD0jVFUalf6fKcEb02NBjwO"; 

    // 运行时代码自动组装安全要是，绝不留任何公网把柄
    function getCleanToken() {
        return "ghp_" + GH_TOKEN_SECRET;
    }

    const GH_API_URL = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/orders.json`;

    let currentUser = ""; 
    let isBoss = false;   
    let mqttClient = null;
    let mqttConnected = false;
    let cleanSalesLogs = []; 

    function checkPwd() {
        const pwd = document.getElementById('accessPwd').value.trim();
        if (pwd === BOSS_PWD) {
            currentUser = "创始人";
            isBoss = true;
            enterSystem();
        } else if (AGENTS[pwd]) {
            currentUser = AGENTS[pwd];
            isBoss = false;
            enterSystem();
        } else {
            alert("❌ 特征码错误，非法访问！");
            document.getElementById('accessPwd').value = '';
        }
    }

    function enterSystem() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('appTitle').innerText = isBoss ? "👑 墨析控制台 (上帝版)" : `💼 发卡端 (${currentUser})`;
        
        if (isBoss) {
            document.getElementById('adminDashboard').style.display = "block"; 
            loadAllHistoryFromGitHub(); 
        }
        initMQTT();
    }

    async function loadAllHistoryFromGitHub() {
        try {
            const response = await fetch(`${GH_API_URL}?timestamp=${new Date().getTime()}`, {
                headers: { "Authorization": `token ${getCleanToken()}` }
            });
            if (response.ok) {
                const fileData = await response.json();
                const rawContent = decodeURIComponent(escape(atob(fileData.content)));
                cleanSalesLogs = JSON.parse(rawContent);
                renderTable();
            } else {
                document.getElementById('logTableBody').innerHTML = `<tr><td colspan="5" style="text-align:center;color:#888;">暂无历史账单（请确保已在仓库创建了 orders.json 并且内容为 []）</td></tr>`;
            }
        } catch (e) {
            document.getElementById('logTableBody').innerHTML = `<tr><td colspan="5" style="text-align:center;color:#ff4d4d;">GitHub 账本读取失败，请检查密钥与用户名配置！</td></tr>`;
        }
    }

    function renderTable() {
        const tbody = document.getElementById('logTableBody');
        if (cleanSalesLogs.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#888;">天网已通电，静候全网出单广播...</td></tr>`;
            document.getElementById('totalOrders').innerText = "0";
            return;
        }
        let sortedLogs = [...cleanSalesLogs].reverse(); 
        tbody.innerHTML = "";
        sortedLogs.forEach(logData => {
            const row = `<tr>
                <td style="color:#00f5d4; font-weight:bold;">${logData.agent}</td>
                <td>${logData.type}</td>
                <td style="font-family:monospace;">${logData.hwid}</td>
                <td style="color:#ffb703;font-family:monospace;">${logData.code}</td>
                <td style="color:#888;">${logData.time}</td>
            </tr>`;
            tbody.innerHTML += row;
        });
        document.getElementById('totalOrders').innerText = cleanSalesLogs.length;
    }

    async function writeLogToGitHub(newLog) {
        try {
            const response = await fetch(`${GH_API_URL}?timestamp=${new Date().getTime()}`, {
                headers: { "Authorization": `token ${getCleanToken()}` }
            });
            let currentLogs = [];
            let fileSha = "";
            
            if (response.ok) {
                const fileData = await response.json();
                fileSha = fileData.sha; 
                const rawContent = decodeURIComponent(escape(atob(fileData.content)));
                currentLogs = JSON.parse(rawContent);
            }
            
            if (currentLogs.some(item => item.code === newLog.code)) return;
            currentLogs.push(newLog);
            
            const updatedContent = btoa(unescape(encodeURIComponent(JSON.stringify(currentLogs, null, 2))));
            await fetch(GH_API_URL, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${getCleanToken()}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: `💼 自动记账流水: ${newLog.agent} 出单`,
                    content: updatedContent,
                    sha: fileSha 
                })
            });
        } catch (e) {
            console.error("GitHub 账本异步写入失败: ", e);
        }
    }

    function initMQTT() {
        const clientId = "keygen_" + Math.random().toString(16).substr(2, 8);
        mqttClient = new Paho.MQTT.Client("u11aa3e0.ala.cn-hangzhou.emqxsl.cn", 8084, "/mqtt", clientId);

        const options = {
            useSSL: true,
            userName: "moxi",
            password: MQTT_PWD,
            onSuccess: () => {
                mqttConnected = true;
                const statusBar = document.getElementById('mqttStatus');
                statusBar.innerText = "🟢 云端安全分销链已锁定 (已联网)";
                statusBar.className = "status-bar status-connected";
                if (isBoss) {
                    mqttClient.subscribe("moxi/sales_log");
                }
            },
            onFailure: (err) => {
                mqttConnected = false;
                const statusBar = document.getElementById('mqttStatus');
                statusBar.innerText = "🔴 连不上云端鉴权中心，请检查网线！";
                statusBar.className = "status-bar status-disconnected";
            },
            keepAliveInterval: 30
        };

        mqttClient.onConnectionLost = (responseObject) => {
            mqttConnected = false;
            const statusBar = document.getElementById('mqttStatus');
            statusBar.innerText = "🔴 连不上云端鉴权中心，请检查网线！";
            statusBar.className = "status-bar status-disconnected";
        };

        mqttClient.onMessageArrived = (message) => {
            if (message.destinationName !== "moxi/sales_log" || !message.payloadString.trim()) return;
            try {
                const logData = JSON.parse(message.payloadString);
                if (!logData.agent || !logData.code) return;
                if (cleanSalesLogs.some(item => item.code === logData.code)) return;
                
                cleanSalesLogs.push(logData);
                renderTable(); 
            } catch (e) {}
        };

        mqttClient.connect(options);
    }

    function generateCode() {
        const hwid = document.getElementById('hwid').value.trim().toUpperCase();
        const durationVal = document.getElementById('duration').value;
        if (!hwid) return alert("没填机器码！");

        if (!isBoss && !mqttConnected) {
            alert("🚨 警告：检测到网络通信中断！\n为防范飞单私吞，系统已强制锁定，禁止离线生成激活码！请联网后再试。");
            return;
        }

        let date = new Date();
        let cardType = "";

        if (durationVal === 'custom') {
            const customVal = document.getElementById('customDate').value;
            if (!customVal) return alert("请先选择自定义的到期时间！");
            date = new Date(customVal);
            cardType = "自定义时长";
        } else {
            const days = parseInt(durationVal);
            if (days === 2) cardType = "体验卡";
            else if (days === 31) cardType = "月卡";
            else if (days === 366) cardType = "年卡";
            else if (days === 99999) cardType = "终身买断版";

            if (days === 99999) {
                date.setFullYear(2099, 11, 31);
                date.setHours(23, 59, 0);
            } else {
                date.setTime(date.getTime() + days * 24 * 60 * 60 * 1000);
            }
        }
        
        const yyyy = date.getFullYear();
        const mm = String(date.getMonth() + 1).padStart(2, '0');
        const dd = String(date.getDate()).padStart(2, '0');
        const hh = String(date.getHours()).padStart(2, '0');
        const min = String(date.getMinutes()).padStart(2, '0');
        
        const expireTimeStr = `${yyyy}${mm}${dd}${hh}${min}`;
        const rawString = hwid + expireTimeStr + SECRET_SALT;
        const signature = generateSignature(rawString);
        const finalCode = `${expireTimeStr}-${signature}`;

        if (!isBoss && mqttConnected) {
            const billData = {
                agent: currentUser,
                type: cardType,
                hwid: hwid,
                code: finalCode,
                time: new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })
            };
            
            const message = new Paho.MQTT.Message(JSON.stringify(billData));
            message.destinationName = "moxi/sales_log";
            message.retained = true;
            mqttClient.send(message);
            
            writeLogToGitHub(billData);
        }

        document.getElementById('activationCode').innerText = finalCode;
        document.getElementById('resultBox').style.display = 'block';
        
        const copyBtn = document.getElementById('copyBtn');
        copyBtn.innerText = "一键复制发给老师";
        copyBtn.style.backgroundColor = "#10b981";
    }

    const SECRET_SALT = "MoXi_Physics_AI_2026_@TopSecret!";

    function generateSignature(str) {
        let hash = 2166136261;
        for (let i = 0; i < str.length; i++) {
            hash ^= str.charCodeAt(i);
            hash += (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24);
        }
        return (hash >>> 0).toString(16).padStart(8, '0').toUpperCase();
    }

    function exportToExcel() {
        if (cleanSalesLogs.length === 0) {
            alert("当前大屏空空如也，无账单可导！");
            return;
        }
        let csvContent = "\uFEFF代理商名称,授权套餐,客户机器码,专属激活码,发卡时间\n";
        cleanSalesLogs.forEach(log => {
            csvContent += `"${log.agent}","${log.type}","${log.hwid}","${log.code}","${log.time}"\n`;
        });
        
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `墨析分销纯净对账单_${new Date().toLocaleDateString().replace(/\//g, '-')}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    async function pasteHWID() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById('hwid').value = text.trim();
        } catch (err) {
            alert("⚠️ 请直接使用 Ctrl+V 粘贴！");
            document.getElementById('hwid').focus();
        }
    }

    function copyCode() {
        const code = document.getElementById('activationCode').innerText;
        if (!code) return;
        const textArea = document.createElement("textarea");
        textArea.value = code;
        document.body.appendChild(textArea);
        textArea.select();
        try {
            document.execCommand('copy');
            const copyBtn = document.getElementById('copyBtn');
            copyBtn.innerText = "✅ 复制成功！去微信发货";
            copyBtn.style.backgroundColor = "#059669";
            setTimeout(() => {
                copyBtn.innerText = "一键复制发给老师";
                copyBtn.style.backgroundColor = "#10b981";
            }, 2000);
        } catch (err) {
            alert("❌ 复制失败！");
        }
        document.body.removeChild(textArea);
    }

    function toggleCustomDate() {
        const type = document.getElementById('duration').value;
        document.getElementById('customDateWrap').style.display = type === 'custom' ? 'block' : 'none';
    }
</script>
</body>
</html>
